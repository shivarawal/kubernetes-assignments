apiVersion: v1
kind: Pod
metadata: 
  name: secret-demo
spec:
  containers:
  - name: nginx-container
    image: nginx
    env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: DB_USER
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: DB_PASSWORD
  
